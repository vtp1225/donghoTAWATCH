spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/TAwatch}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false

server:
  servlet:
    context-path: /tawatch
  port: 8080

app:
  mail:
    from: ${MAIL_USERNAME:no-reply@tawatch.vn}
    show-otp-in-response: ${SHOW_OTP_IN_RESPONSE:true}
  bank:
    name: ${BANK_NAME:Vietcombank}
    account-number: ${BANK_ACCOUNT_NUMBER:1234567890}
    account-name: ${BANK_ACCOUNT_NAME:CONG TY TAWATCH}
  vnpay:
    payment-url: ${VNPAY_PAYMENT_URL:http://localhost:8080/tawatch/payments/vnpay/callback}

jwt:
  secret: "tawatch-jwt-secret-key-for-authentication-2026-secure"
  expiration: 86400000

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
