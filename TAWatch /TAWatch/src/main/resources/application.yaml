spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      connection-init-sql: "SET SESSION sql_mode='NO_ENGINE_SUBSTITUTION'"
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false
  jpa:
    hibernate:
      ddl-auto: update
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

server:
  servlet:
    context-path: /tawatch
  port: ${PORT:8080}
app:
  mail:
    from: ${MAIL_USERNAME:no-reply@tawatch.vn}
    show-otp-in-response: ${SHOW_OTP_IN_RESPONSE:true}
  bank:
    name: ${BANK_NAME:Vietcombank}

    account-number: ${BANK_ACCOUNT_NUMBER:1234567890}
    account-name: ${BANK_ACCOUNT_NAME:CONG TY TAWATCH}
  vnpay:
    tmn-code: ${VNPAY_TMN_CODE:9ANL2H3D}
    hash-secret: ${VNPAY_HASH_SECRET:F6O7RX7KNH63AFTD9ZELJCFVJ5QDV9FC}
    payment-url: ${VNPAY_PAYMENT_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
    return-url: ${VNPAY_RETURN_URL:http://localhost:5173/payment/vnpay-return}
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
cloudinary:
  cloud-name: ${CLOUD_NAME}
  api-key: ${CLOUD_API_KEY}
  api-secret: ${CLOUD_API_SECRET}
ghn:
  token: ${GHN_TOKEN}
  shop-id: ${GHN_SHOP_ID}
  base-url: ${GHN_BASE_URL:https://online-gateway.ghn.vn/shiip/public-api}