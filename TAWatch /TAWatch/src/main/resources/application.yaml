spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      connection-init-sql: "SET SESSION sql_mode='NO_ENGINE_SUBSTITUTION'"
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false
  jpa:
    hibernate:
      ddl-auto: update

server:
  servlet:
    context-path: /tawatch
  port: ${PORT:8080}

app:
  mail:
    from: ${MAIL_USERNAME:no-reply@tawatch.vn}
    show-otp-in-response: ${SHOW_OTP_IN_RESPONSE:true}
  bank:
    name: ${BANK_NAME:Vietcombank}

    account-number: ${BANK_ACCOUNT_NUMBER:1234567890}
    account-name: ${BANK_ACCOUNT_NAME:CONG TY TAWATCH}
  vnpay:
    payment-url: ${VNPAY_PAYMENT_URL:http://localhost:8080/tawatch/payments/vnpay/callback}
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
